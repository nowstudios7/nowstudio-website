  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t: 72px;\n    background: rgba(250,248,245,0.92);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(201,168,118,0.18);\n    transition: box-shadow .3s;\n  }\n  header.scrolled { box-shadow: 0 2px 32px rgba(26,23,20,0.07); }\n\n  .logo {\n    font-family: var(--serif);\n    font-size: 22px;\n    font-weight: 500;\n    letter-spacing: 0.12em;\n    color: var(--dark);\n    text-decoration: none;\n  }\n  .logo span { color: var(--gold); }\n\n  nav { display: flex; gap: 40px; align-items: center; }\n  nav a {\n    font-family: var(--sans);\n    font-size: 13px;\n    font-weight: 400;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--mid);\n    text-decoration: none;\n    transition: color .2s;\n    position: relative;\n  }\n  nav a::after {\n    content: '';\n    position: absolute; bottom: -3px; left: 0; right: 0;\n    height: 1px; background: var(--gold);\n    transform: scaleX(0); transition: transform .25s;\n  }\n  nav a:hover { color: var(--dark); }\n  nav a:hover::after { transform: scaleX(1); }\n\n  .nav-cta {\n    background: var(--gold); color: var(--white) !important;\n    padding: 10px 24px; border-radius: 2px;\n    letter-spacing: 0.1em;\n    transition: background .2s !important;\n  }\n  .nav-cta::after { display: none !important; }\n  .nav-cta:hover { background: var(--gold-dark) !important; }\n\n  /* ── HERO ── */\n  #hero {\n    min-height: 100vh;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    padding-top: 72px;\n  }\n\n  .hero-left {\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 80px 60px 80px 60px;\n    position: relative;\n  }\n\n  .hero-eyebrow {\n    font-family: var(--sans);\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 28px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .hero-eyebrow::before {\n    content: '';\n    display: block; width: 32px; height: 1px;\n    background: var(--gold);\n  }\n\n  .hero-headline {\n    font-family: var(--serif);\n    font-size: clamp(42px, 5vw, 68px);\n    font-weight: 400;\n    line-height: 1.15;\n    color: var(--dark);\n    margin-bottom: 12px;\n    text-wrap: pretty;\n  }\n\n  .hero-sub {\n    font-family: var(--serif);\n    font-size: clamp(18px, 2vw, 24px);\n    font-style: italic;\n    font-weight: 300;\n    color: var(--gold-dark);\n    margin-bottom: 28px;\n  }\n\n  .hero-desc {\n    font-size: 15px;\n    color: var(--muted);\n    max-width: 400px;\n    line-height: 1.75;\n    margin-bottom: 48px;\n  }\n\n  .hero-stats {\n    display: flex; gap: 40px; margin-bottom: 52px;\n  }\n  .stat-item { display: flex; flex-direction: column; gap: 4px; }\n  .stat-num {\n    font-family: var(--serif);\n    font-size: 36px;\n    font-weight: 500;\n    color: var(--dark);\n    line-height: 1;\n  }\n  .stat-label {\n    font-size: 11px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .stat-divider {\n    width: 1px; background: rgba(201,168,118,0.3);\n    align-self: stretch;\n  }\n\n  .hero-actions { display: flex; gap: 16px; align-items: center; }\n  .btn-primary {\n    background: var(--dark);\n    color: var(--white);\n    font-family: var(--sans);\n    font-size: 13px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    padding: 16px 36px;\n    border: none; cursor: pointer;\n    text-decoration: none;\n    transition: background .2s, transform .15s;\n    display: inline-block;\n  }\n  .btn-primary:hover { background: var(--gold-dark); transform: translateY(-1px); }\n\n  .btn-ghost {\n    font-family: var(--sans);\n    font-size: 13px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--mid);\n    text-decoration: none;\n    display: flex; align-items: center; gap: 10px;\n    border-bottom: 1px solid transparent;\n    padding-bottom: 2px;\n    transition: color .2s, border-color .2s;\n  }\n  .btn-ghost:hover { color: var(--gold-dark); border-color: var(--gold); }\n  .btn-ghost svg { transition: transform .2s; }\n  .btn-ghost:hover svg { transform: translateX(4px); }\n\n  .hero-right {\n    position: relative;\n    overflow: hidden;\n    background: #e8ddd0;\n  }\n  .hero-img-placeholder {\n    width: 100%; height: 100%;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    gap: 16px;\n    background: linear-gradient(135deg, #e8ddd0 0%, #d4c4b0 50%, #c8b89a 100%);\n    position: relative;\n  }\n  .hero-img-placeholder::before {\n    content: '';\n    position: absolute; inset: 0;\n    background: repeating-linear-gradient(\n      45deg,\n      transparent, transparent 40px,\n      rgba(201,168,118,0.07) 40px, rgba(201,168,118,0.07) 41px\n    );\n  }\n  .hero-img-placeholder .cam-icon {\n    width: 72px; height: 72px; opacity: 0.35;\n  }\n  .hero-img-label {\n    font-family: monospace;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    color: rgba(168,134,79,0.6);\n    text-transform: uppercase;\n  }\n  .hero-badge {\n    position: absolute;\n    bottom: 48px; left: -24px;\n    background: var(--white);\n    padding: 20px 28px;\n    box-shadow: 0 8px 40px rgba(26,23,20,0.12);\n    z-index: 2;\n  }\n  .hero-badge-label {\n    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;\n    color: var(--muted); margin-bottom: 4px;\n  }\n  .hero-badge-val {\n    font-family: var(--serif); font-size: 22px; font-weight: 500;\n    color: var(--dark);\n  }\n\n  /* ── SECTION COMMON ── */\n  section { padding: 120px 60px; }\n  .section-label {\n    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--gold); display: flex; align-items: center; gap: 12px;\n    margin-bottom: 20px;\n  }\n  .section-label::before { content: ''; display: block; width: 32px; height: 1px; background: var(--gold); }\n  .section-title {\n    font-family: var(--serif);\n    font-size: clamp(36px, 4vw, 56px);\ ides.length) % slides.length;\n  slides[slideIdx].classList.add('active');\n  sdots[slideIdx].classList.add('active');\n}\nsetInterval(() => goSlide(slideIdx + 1), 4000);\n\n// Scroll header shadow\nwindow.addEventListener('scroll', () => {\n  document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 20);\n});\n\n// Mobile menu\nfunction toggleMenu() {\n  document.getElementById('nav-links').classList.toggle('open');\n}\n\n// Testimonials\nconst testimonials = [\n  {\n    text: \"NOW Studio đã biến ngày cưới của chúng tôi thành những bức ảnh đẹp nhất mà chúng tôi từng thấy. Mỗi khoảnh khắc đều được ghi lại hoàn hảo.\",\n    author: \"Nguyễn Linh & Trần Minh — Đám cưới tháng 3, 2024\"\n  },\n  {\n    text: \"Đội ngũ chuyên nghiệp, nhiệt tình và rất am hiểu nghệ thuật. Bộ ảnh cưới của chúng tôi vượt xa mọi mong đợi. Cảm ơn NOW Studio!\",\n    author: \"Phạm Thu & Lê Hùng — Đám cưới tháng 10, 2023\"\n  },\n  {\n    text: \"Từ makeup đến chụp ảnh, mọi thứ đều hoàn hảo. Chúng tôi sẽ giới thiệu NOW Studio cho tất cả bạn bè.\",\n    author: \"Vũ Mai & Đặng Quân — Đám cưới tháng 6, 2024\"\n  }\n];\nlet tIdx = 0;\n\nfunction setTestimonial(i) {\n  tIdx = i;\n  document.getElementById('tq-text').textContent = testimonials[i].text;\n  document.getElementById('tq-author').textContent = testimonials[i].author;\n  document.querySelectorAll('.t-dot').forEach((d, j) => d.classList.toggle('active', j === i));\n}\n\nsetInterval(() => setTestimonial((tIdx + 1) % testimonials.length), 6000);\n\n// Form submit\nfunction handleSubmit(e) {\n  e.preventDefault();\n  const btn = e.target.querySelector('.btn-submit');\n  btn.textContent = 'Đã gửi! ✓';\n  btn.style.background = '#6a8f6a';\n  setTimeout(() => { btn.textContent = 'Gửi Yêu Cầu'; btn.style.background = ''; }, 3000);\n}\n\n// Tweaks\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"#c9a876\",\n  \"font\": \"'Cormorant Garamond', Georgia, serif\",\n  \"hero\": \"split\",\n  \"bg\": \"#faf8f5\"\n}/*EDITMODE-END*/;\n\nfunction applyTweaks() {\n  const accent = document.getElementById('tw-accent').value;\n  const font   = document.getElementById('tw-font').value;\n  const hero   = document.getElementById('tw-hero').value;\n  const bg     = document.getElementById('tw-bg').value;\n\n  // Compute darker/lighter from accent hex\n  document.documentElement.style.setProperty('--gold', accent);\n  document.documentElement.style.setProperty('--serif', font);\n  document.documentElement.style.setProperty('--bg', bg);\n\n  // Hero layout\n  const heroEl = document.getElementById('hero');\n  if (hero === 'centered') {\n    heroEl.style.gridTemplateColumns = '1fr';\n    heroEl.querySelector('.hero-right').style.display = 'none';\n    heroEl.querySelector('.hero-left').style.maxWidth = '720px';\n    heroEl.querySelector('.hero-left').style.margin = '0 auto';\n  } else {\n    heroEl.style.gridTemplateColumns = '1fr 1fr';\n    heroEl.querySelector('.hero-right').style.display = '';\n    heroEl.querySelector('.hero-left').style.maxWidth = '';\n    heroEl.querySelector('.hero-left').style.margin = '';\n  }\n\n  // Dark mode text adjustment\n  if (bg === '#1a1714') {\n    document.body.style.color = '#f0ece6';\n    document.querySelectorAll('.service-card, #portfolio').forEach(el => el.style.background = '#2a2520');\n  } else {\n    document.body.style.color = '';\n    document.querySelectorAll('.service-card, #portfolio').forEach(el => el.style.background = '');\n  }\n\n  window.parent.postMessage({\n    type: '__edit_mode_set_keys',\n    edits: { accent, font, hero, bg }\n  }, '*');\n}\n\n// Apply saved values on load\n(function() {\n  const d = TWEAK_DEFAULTS;\n  if (document.getElementById('tw-accent')) document.getElementById('tw-accent').value = d.accent;\n  if (document.getElementById('tw-font'))   document.getElementById('tw-font').value   = d.font;\n  if (document.getElementById('tw-hero'))   document.getElementById('tw-hero').value   = d.hero;\n  if (document.getElementById('tw-bg'))     document.getElementById('tw-bg').value     = d.bg;\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
